name: CI DB Main - Roboshop User
on:
  push:
    branches:
      - main
    paths:
      - 'db/**'
      - '.github/workflows/ci-db-main.yml'
  workflow_dispatch:

jobs:
  docker-build-db:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Build and push DB image
        run: make docker-build-db
